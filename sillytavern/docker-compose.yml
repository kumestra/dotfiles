services:
  sillytavern:
    container_name: sillytavern
    hostname: sillytavern
    image: ghcr.nju.edu.cn/sillytavern/sillytavern:latest
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
      - SILLYTAVERN_HEARTBEATINTERVAL=30
      - 'SILLYTAVERN_WHITELIST=["127.0.0.1", "::1", "172.16.0.0/12"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
