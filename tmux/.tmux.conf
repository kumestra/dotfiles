# =============================================================================
# Terminal Color Support
# =============================================================================

# Use tmux's 256-color terminal description inside panes.
set -g default-terminal "tmux-256color"

# Enable true color for common *256color terminals.
set -ga terminal-overrides ",*256col*:Tc"

# Always use vi-style keys in copy mode.
set -g mode-keys vi

# WORKAROUND BEGIN: chat-scroll (tmux copy-mode vs chat app mismatch)
# Root cause: tmux copy-mode is designed for text/file navigation, not chat.
# These bindings make PageUp/PageDown behave like a chat app's scroll.
# Replace this block when tmux adds native chat-scroll support.
# =============================================================================

# PageUp (normal mode): enter copy mode and scroll up half page.
# HACK: no single tmux command does both; chain copy-mode + halfpage-up.
bind-key -n PageUp copy-mode \; send-keys -X halfpage-up

# PageUp (copy mode): scroll up half page.
bind-key -T copy-mode-vi PageUp send-keys -X halfpage-up

# PageDown (copy mode): scroll down half page.
bind-key -T copy-mode-vi PageDown send-keys -X halfpage-down

# Typing keys (copy mode): exit copy mode and replay the key to the terminal.
# Lets user start a new prompt without pressing q first.
# HACK: no tmux primitive for "exit and forward key" — each key needs its own
# binding. Key specs and send-keys values quoted uniformly for consistency.

# Escape: exit copy mode without replaying.
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Letters
bind-key -T copy-mode-vi "a" send-keys -X cancel \; send-keys "a"
bind-key -T copy-mode-vi "b" send-keys -X cancel \; send-keys "b"
bind-key -T copy-mode-vi "c" send-keys -X cancel \; send-keys "c"
bind-key -T copy-mode-vi "d" send-keys -X cancel \; send-keys "d"
bind-key -T copy-mode-vi "e" send-keys -X cancel \; send-keys "e"
bind-key -T copy-mode-vi "f" send-keys -X cancel \; send-keys "f"
bind-key -T copy-mode-vi "g" send-keys -X cancel \; send-keys "g"
bind-key -T copy-mode-vi "h" send-keys -X cancel \; send-keys "h"
bind-key -T copy-mode-vi "i" send-keys -X cancel \; send-keys "i"
bind-key -T copy-mode-vi "j" send-keys -X cancel \; send-keys "j"
bind-key -T copy-mode-vi "k" send-keys -X cancel \; send-keys "k"
bind-key -T copy-mode-vi "l" send-keys -X cancel \; send-keys "l"
bind-key -T copy-mode-vi "m" send-keys -X cancel \; send-keys "m"
bind-key -T copy-mode-vi "n" send-keys -X cancel \; send-keys "n"
bind-key -T copy-mode-vi "o" send-keys -X cancel \; send-keys "o"
bind-key -T copy-mode-vi "p" send-keys -X cancel \; send-keys "p"
bind-key -T copy-mode-vi "q" send-keys -X cancel \; send-keys "q"
bind-key -T copy-mode-vi "r" send-keys -X cancel \; send-keys "r"
bind-key -T copy-mode-vi "s" send-keys -X cancel \; send-keys "s"
bind-key -T copy-mode-vi "t" send-keys -X cancel \; send-keys "t"
bind-key -T copy-mode-vi "u" send-keys -X cancel \; send-keys "u"
bind-key -T copy-mode-vi "v" send-keys -X cancel \; send-keys "v"
bind-key -T copy-mode-vi "w" send-keys -X cancel \; send-keys "w"
bind-key -T copy-mode-vi "x" send-keys -X cancel \; send-keys "x"
bind-key -T copy-mode-vi "y" send-keys -X cancel \; send-keys "y"
bind-key -T copy-mode-vi "z" send-keys -X cancel \; send-keys "z"

# Digits
bind-key -T copy-mode-vi "0" send-keys -X cancel \; send-keys "0"
bind-key -T copy-mode-vi "1" send-keys -X cancel \; send-keys "1"
bind-key -T copy-mode-vi "2" send-keys -X cancel \; send-keys "2"
bind-key -T copy-mode-vi "3" send-keys -X cancel \; send-keys "3"
bind-key -T copy-mode-vi "4" send-keys -X cancel \; send-keys "4"
bind-key -T copy-mode-vi "5" send-keys -X cancel \; send-keys "5"
bind-key -T copy-mode-vi "6" send-keys -X cancel \; send-keys "6"
bind-key -T copy-mode-vi "7" send-keys -X cancel \; send-keys "7"
bind-key -T copy-mode-vi "8" send-keys -X cancel \; send-keys "8"
bind-key -T copy-mode-vi "9" send-keys -X cancel \; send-keys "9"

# Punctuation (ordered by QWERTY keyboard position: top row → bottom row)
bind-key -T copy-mode-vi "-" send-keys -X cancel \; send-keys "-"
bind-key -T copy-mode-vi "=" send-keys -X cancel \; send-keys "="
bind-key -T copy-mode-vi "[" send-keys -X cancel \; send-keys "["
bind-key -T copy-mode-vi "]" send-keys -X cancel \; send-keys "]"
bind-key -T copy-mode-vi "\\" send-keys -X cancel \; send-keys "\\"
bind-key -T copy-mode-vi \; { send-keys -X cancel ; send-keys -l ";" }
bind-key -T copy-mode-vi "'" send-keys -X cancel \; send-keys "'"
bind-key -T copy-mode-vi "," send-keys -X cancel \; send-keys ","
bind-key -T copy-mode-vi "." send-keys -X cancel \; send-keys "."
bind-key -T copy-mode-vi "/" send-keys -X cancel \; send-keys "/"

# Editing keys
bind-key -T copy-mode-vi BSpace send-keys -X cancel \; send-keys BSpace
bind-key -T copy-mode-vi Enter send-keys -X cancel \; send-keys Enter
# WORKAROUND END: chat-scroll

# =============================================================================
# Key Bindings
# =============================================================================

# Prefix + r: reload config.
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# =============================================================================
# Status Bar
# =============================================================================

# Use two status lines.
set -g status 2

# Refresh the status bar every 3 seconds.
set -g status-interval 3

# Base Solarized style.
set -g status-style 'bg=#073642 fg=#839496'

# Dim format for inactive windows.
set -g window-status-format '#[fg=#586e75] #I:#W '

# Highlight the active window in Solarized yellow.
set -g window-status-current-format '#[fg=#b58900] #I:#W '

# First line right side: empty so the window list gets the full width.
set -g status-right ''

# Second line: cwd, git branch, prefix/copy indicator, pane title, and Singapore time.
set -g status-format[1] '📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch")#[align=right]#{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} "#{=21:pane_title}" 📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")'
