# =============================================================================
# Terminal Color Support
# =============================================================================

# Use tmux's 256-color terminal description inside panes.
set -g default-terminal "tmux-256color"

# Enable true color for common *256color terminals.
set -ga terminal-overrides ",*256col*:Tc"

# Always use vi-style keys in copy mode.
set -g mode-keys vi

# Enable mouse support (scroll, select panes/windows, resize).
set -g mouse on

# =============================================================================
# Window Indexing
# =============================================================================

# Start window numbering at 1.
set -g base-index 1

# Renumber windows to close gaps when one is closed.
set -g renumber-windows on

# =============================================================================
# Key Bindings
# =============================================================================

# Prefix + r: reload config.
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# PageUp: enter copy mode and scroll up half a page.
bind-key -n PageUp copy-mode \; send-keys -X halfpage-up

# PageUp/PageDown: move half a page in vi copy mode.
bind-key -T copy-mode-vi PageUp send-keys -X halfpage-up
bind-key -T copy-mode-vi PageDown send-keys -X halfpage-down \; if-shell -F '#{==:#{scroll_position},0}' 'send-keys -X cancel'

# =============================================================================
# Status Bar
# =============================================================================

# Use two status lines.
set -g status 2

# Refresh the status bar every 3 seconds.
set -g status-interval 3

# Base Solarized style.
set -g status-style 'bg=#073642 fg=#839496'

# Dim format for inactive windows.
set -g window-status-format '#[fg=#586e75] #I:#W '

# Highlight the active window in Solarized yellow.
set -g window-status-current-format '#[fg=#b58900] #I:#W '

# First line right side: empty so the window list gets the full width.
set -g status-right ''

# Second line: cwd, git branch, prefix/copy indicator, pane title, and US date/time.
set -g status-format[1] '📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch")#[align=right]#{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} "#{pane_title}" 📅 #(TZ="Asia/Singapore" date +"%%A, %%B %%e, %%Y %%I:%%M %%p")'
