set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Set the global style for the tmux status bar (the bar at the bottom of the screen).
#
# set       - tmux command to set an option
# -g        - global flag, applies to all sessions (not just the current one)
# status-style - the option that controls the visual appearance of the status bar.
#               This accepts a comma-separated list of style attributes such as:
#               bg (background color), fg (foreground/text color),
#               bold, dim, underscore, blink, reverse, hidden, italics, etc.
#
# 'bg=#073642' - sets the background color of the entire status bar to #073642,
#                which is the Solarized Dark "base02" color. This is a hex RGB value
#                (07 red, 36 green, 42 blue) and requires true color (24-bit) support
#                in tmux to render accurately. Without true color, tmux would
#                approximate this to the nearest color in the 256-color palette,
#                which may not match exactly.
#
#                We do not set fg here, so the foreground (text) color will use
#                the terminal's default.
set -g status-style 'bg=#073642 fg=#839496'
set -g window-status-format '#[fg=#586e75] #I:#W '
set -g window-status-current-format '#[fg=#b58900] #I:#W '
set -g status-right-length 256
set -g status-right '"#{=21:pane_title}" #{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} 📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch") 📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")'
