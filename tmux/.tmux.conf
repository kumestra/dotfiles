# =============================================================================
# Terminal Color Support
# =============================================================================

# Use tmux's 256-color terminal description inside panes.
set -g default-terminal "tmux-256color"

# Enable true color for common *256color terminals.
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# Status Bar
# =============================================================================

# Use two status lines.
set -g status 2

# Refresh the status bar every 3 seconds.
set -g status-interval 3

# Base Solarized style.
set -g status-style 'bg=#073642 fg=#839496'

# Dim format for inactive windows.
set -g window-status-format '#[fg=#586e75] #I:#W '

# Highlight the active window in Solarized yellow.
set -g window-status-current-format '#[fg=#b58900] #I:#W '

# First line right side.
set -g status-right '#{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} "#{=21:pane_title}"'

# Second line: cwd, git branch, and Singapore time.
set -g status-format[1] '📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch")#[align=right]📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")'
