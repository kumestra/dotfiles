# =============================================================================
# Terminal Color Support
# =============================================================================

# Tell programs running inside tmux that their terminal supports 256 colors.
# tmux is a terminal multiplexer — each pane is a virtual terminal. Programs
# inside (like vim, htop) check the $TERM environment variable to know what
# the terminal can do. This sets $TERM=tmux-256color inside every pane, so
# programs know they can use at least 256 colors.
#
# set  - tmux command to set an option
# -g   - global flag, applies to all sessions (not just the current one)
set -g default-terminal "tmux-256color"

# Override the terminfo database to tell tmux the outer terminal supports
# true color (24-bit RGB, 16 million colors).
#
# How it works:
#   When you connect to this machine (e.g., via SSH from Windows Terminal),
#   the SSH client forwards your terminal type to the server as an
#   environment variable, typically $TERM=xterm-256color. Tmux reads this
#   and looks up "xterm-256color" in the system's terminfo database
#   (located at /usr/share/terminfo/) to find out what your terminal can do.
#   The problem is: the terminfo entry for xterm-256color only says it
#   supports 256 colors — it doesn't mention true color, even though most
#   modern terminals (Windows Terminal, iTerm2, Alacritty, etc.) fully
#   support it. The database simply hasn't caught up.
#
# What this command does:
#   It tells tmux: "for any outer terminal whose $TERM name matches
#   *256col* (like xterm-256color, screen-256color), override the terminfo
#   database and add the Tc (true color) capability."
#
# Why it matters:
#   Without this, when tmux sees a 24-bit color code like #073642, it
#   checks terminfo, finds no true color support listed, and downgrades
#   the color to the nearest match in the 256-color palette — which may
#   look slightly wrong. With this override, tmux knows it's safe to pass
#   the exact 24-bit color through to your real terminal, so #073642
#   renders as the precise Solarized base02 color you intended.
#
# -ga  - global + append (adds to existing overrides instead of replacing)
# ",*256col*:Tc" - comma is a separator in the overrides list, *256col*
#                  is a wildcard pattern matching terminal names, and Tc
#                  is the true color capability flag.
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# Status Bar — Global Style
# =============================================================================

# Set the background and foreground (text) color of the entire status bar.
#
# status-style - controls the visual appearance of the status bar. Accepts
#                attributes like: bg (background), fg (foreground/text),
#                bold, dim, underscore, blink, reverse, hidden, italics.
#
# bg=#073642   - Solarized Dark "base02" color. This is slightly lighter
#                than the main background (base03 #002b36), which gives
#                the status bar a subtle highlight to distinguish it from
#                the terminal content above.
#
# fg=#839496   - Solarized Dark "base0" color. This is the default body
#                text color in the Solarized palette, providing comfortable
#                readability against the base02 background.
set -g status-style 'bg=#073642 fg=#839496'

# =============================================================================
# Status Bar — Window List
# =============================================================================

# Format for INACTIVE windows in the window list (the middle section of the
# status bar).
#
# window-status-format - defines how non-active windows are displayed.
#
# #[fg=#586e75] - inline style that sets the text color to Solarized "base01".
#                 This is a dim, muted grey — dimmer than the default body text
#                 (base0), so inactive windows visually recede into the
#                 background and don't compete with the active window.
#
# #I            - tmux variable for the window index number (0, 1, 2, ...).
# #W            - tmux variable for the window name (bash, vim, htop, ...).
#
# The format displays as: " 0:bash " or " 1:vim " with leading/trailing spaces
# for padding between windows.
set -g window-status-format '#[fg=#586e75] #I:#W '

# Format for the ACTIVE (currently selected) window in the window list.
#
# window-status-current-format - defines how the active window is displayed.
#
# #[fg=#b58900] - inline style that sets the text color to Solarized "yellow".
#                 This is a warm, bright color that immediately draws the eye,
#                 creating a clear visual hierarchy: active window (yellow)
#                 pops out while inactive windows (dim grey base01) fade back.
#
# #I:#W         - same format as inactive: index:name.
set -g window-status-current-format '#[fg=#b58900] #I:#W '

# =============================================================================
# Status Bar — Right Side
# =============================================================================

# Set the maximum character length for the right side of the status bar.
# The default is 40 characters, which is too short when displaying multiple
# pieces of information (pane title, mode indicator, path, git branch, date).
# 256 gives plenty of room for all segments without truncation.
set -g status-right-length 256

# The right side of the status bar, composed of several segments:
#
# SEGMENT 1: Pane Title
#   "#{=21:pane_title}"
#   - Displays the title of the current pane in double quotes.
#   - #{=21:...} truncates the value to 21 characters max.
#   - The pane title is set dynamically by the shell or running program via
#     terminal escape sequences. For example, bash might set it to
#     "user@hostname: /path", and vim might set it to the filename.
#
# SEGMENT 2: Mode Indicator
#   #{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}}
#   - Uses tmux conditional syntax: #{?condition,true_value,false_value}
#   - #{client_prefix} is 1 when the prefix key has been pressed and tmux
#     is waiting for the next key. Shows ⏳ (hourglass = "waiting").
#   - #{pane_in_mode} is 1 when in copy mode (scrollback/selection).
#     Shows 📋 (clipboard = "selecting/copying text").
#   - In normal mode, shows nothing — no need to indicate the default state.
#   - These are nested: first checks prefix, then copy mode, then empty.
#
# SEGMENT 3: Current Directory
#   📂 #{pane_current_path}
#   - 📂 (open folder emoji) followed by the full working directory path
#     of the currently active pane.
#   - #{pane_current_path} is a tmux variable that automatically updates
#     as you cd around in the shell.
#
# SEGMENT 4: Git Branch
#   #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch")
#   - #(...) runs a shell command and inserts its output.
#   - First, cd to the pane's current directory.
#   - Then, get the current git branch name. The 2>/dev/null suppresses
#     error messages when not in a git repository.
#   - [ -n "$branch" ] checks if the branch name is non-empty.
#   - If all conditions pass, outputs "🌿 main" (or whatever branch).
#   - If not in a git repo, all the && conditions fail silently and
#     nothing is shown — no error, no empty space.
#
# SEGMENT 5: Date and Time
#   📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")
#   - 📅 (calendar emoji) followed by the date and time.
#   - #(...) runs the date command with TZ set to Singapore timezone (UTC+8).
#   - The %% is needed because tmux uses % for its own variables (like %H:%M
#     in strftime), so we double them to escape them inside #() shell commands.
#   - Format: YYYY-MM-DD Day HH:MM (e.g., "2026-04-01 Wed 14:30")
#   - This is an informal ISO 8601 format — the date part (YYYY-MM-DD) is
#     the international standard, and the abbreviated day name is added
#     for human readability.
set -g status-right '"#{=21:pane_title}" #{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} 📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch") 📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")'
