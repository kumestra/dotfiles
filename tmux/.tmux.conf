# =============================================================================
# Terminal Color Support
# =============================================================================

# Use tmux's 256-color terminal description inside panes.
set -g default-terminal "tmux-256color"

# Enable true color for common *256color terminals.
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# Status Bar — Global Style
# =============================================================================

# Base Solarized style for the status bar.
set -g status-style 'bg=#073642 fg=#839496'

# =============================================================================
# Status Bar — Window List
# =============================================================================

# Dim format for inactive windows.
set -g window-status-format '#[fg=#586e75] #I:#W '

# Highlight the active window in Solarized yellow.
set -g window-status-current-format '#[fg=#b58900] #I:#W '

# =============================================================================
# Status Bar — Right Side
# =============================================================================

# Reserve enough room for the full right-side status content.
set -g status-right-length 256

# Right status: pane title, mode, cwd, git branch, Singapore time.
set -g status-right '"#{=21:pane_title}" #{?client_prefix,⏳ ,#{?pane_in_mode,📋 ,}} 📂 #{pane_current_path} #(cd #{pane_current_path} && branch=$(git branch --show-current 2>/dev/null) && [ -n "$branch" ] && echo "🌿 $branch") 📅 #(TZ="Asia/Singapore" date +"%%Y-%%m-%%d %%a %%H:%%M")'
